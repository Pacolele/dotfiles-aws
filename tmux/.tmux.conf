# =============================================================================
# tmux configuration
# =============================================================================

# --- Default Shell (pixi zsh with prezto) ---
set-option -g default-shell "/home/ehernesten/.pixi/bin/zsh"

# --- Prefix Key: Ctrl+a ---
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# --- General Settings ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window 0 acts as "10" (last in order, like i3/sway)
bind 0 select-window -t :10
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 10

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- Mouse Support ---
set -g mouse on

# --- Vi Mode (copy mode) ---
setw -g mode-keys vi

# Vi-style copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Enter copy mode with prefix + [
bind [ copy-mode

# --- Vim-style Pane Navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window Splits (intuitive keys) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# --- Status Bar ---
set -g status-position bottom
set -g status-style 'bg=default,fg=white'
set -g status-left '#[fg=blue,bold] #S '
set -g status-right '#[fg=white]%H:%M '
set -g status-left-length 30
setw -g window-status-current-style 'fg=magenta,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=grey'
setw -g window-status-format ' #I:#W '

# --- Window Switcher (prefix+s) ---
# Flat window list for current session, j/k to navigate, l or Space or Enter to select
bind s display-popup -E -w 40% -h 40% "tmux list-windows -F '#{window_index}:#{window_name}' | fzf --reverse --no-info --bind 'l:accept,space:accept' --header='Switch window' | cut -d: -f1 | xargs -I{} tmux select-window -t {}"

# --- Session Switcher (prefix+S) ---
# Flat session list, j/k to navigate, l or Space or Enter to select
bind S display-popup -E -w 40% -h 40% "tmux list-sessions -F '#{session_name}' | fzf --reverse --no-info --bind 'l:accept,space:accept' --header='Switch session' | xargs -I{} tmux switch-client -t {}"

# --- Reload Config ---
# Kill pane immediately
bind x kill-pane

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings - save/restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum - auto save & restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# --- Initialize TPM (keep at the very bottom) ---
run '~/.tmux/plugins/tpm/tpm'
