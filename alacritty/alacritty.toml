# Alacritty Configuration

# Import Catppuccin theme
import = ["~/.config/alacritty/themes/catppuccin-macchiato.toml"]

[env]
TERM = "xterm-256color"

[shell]
program = "/home/ehernesten/.pixi/bin/zsh"
args = ["--login"]

[window]
padding = { x = 8, y = 8 }
decorations = "Full"
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
size = 14.0

[font.normal]
family = "FiraMono Nerd Font"
style = "Regular"

[font.bold]
family = "FiraMono Nerd Font"
style = "Bold"

[font.italic]
family = "FiraMono Nerd Font"
style = "Regular"

[font.bold_italic]
family = "FiraMono Nerd Font"
style = "Bold"

[cursor]
style = { shape = "Block", blinking = "On" }
unfocused_hollow = true

# window.opacity: Set to 1.0 for fully opaque, lower for transparency
# (requires compositor support)

[selection]
save_to_clipboard = true


